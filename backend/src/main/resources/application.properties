spring.application.name=api

springdoc.swagger-ui.path=/docs.html

admin-application=false
admin-application-username=root
admin-application-password=root

spring.datasource.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

jwt.secret=${JWT_SECRET}
jwt.access-token.duracao-minutos=${JWT_ACCESS_DURATION_MINUTES:15}
jwt.refresh-token.duracao-dias=${JWT_REFRESH_DURATION_DAYS:7}

