databaseChangeLog:
  - changeSet:
      id: 004-01-create-conta
      author: ramos
      changes:
        - createTable:
            tableName: conta
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_conta
                    nullable: false
              - column:
                  name: usuario_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: nome
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: tipo
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: saldo_inicial
                  type: NUMERIC(12,2)
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: ativa
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: criado_em
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: atualizado_em
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: conta
            baseColumnNames: usuario_id
            constraintName: fk_conta_usuario
            referencedTableName: usuario
            referencedColumnNames: id
            onDelete: CASCADE
            onUpdate: CASCADE

        - createIndex:
            tableName: conta
            indexName: idx_conta_usuario_id
            columns:
              - column:
                  name: usuario_id

  - changeSet:
      id: 004-02-create-categoria
      author: ramos
      changes:
        - createTable:
            tableName: categoria
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_categoria
                    nullable: false
              - column:
                  name: usuario_id
                  type: BIGINT
              - column:
                  name: nome
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: tipo
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: ativa
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: criado_em
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: atualizado_em
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: categoria
            baseColumnNames: usuario_id
            constraintName: fk_categoria_usuario
            referencedTableName: usuario
            referencedColumnNames: id
            onDelete: CASCADE
            onUpdate: CASCADE

        - addUniqueConstraint:
            tableName: categoria
            columnNames: usuario_id,nome,tipo
            constraintName: uq_categoria_usuario_nome_tipo

        - createIndex:
            tableName: categoria
            indexName: idx_categoria_usuario_id
            columns:
              - column:
                  name: usuario_id

        - createIndex:
            tableName: categoria
            indexName: idx_categoria_tipo
            columns:
              - column:
                  name: tipo

  - changeSet:
      id: 004-03-create-lancamento
      author: ramos
      changes:
        - createTable:
            tableName: lancamento
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_lancamento
                    nullable: false
              - column:
                  name: usuario_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: conta_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: categoria_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: tipo
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: descricao
                  type: VARCHAR(255)
              - column:
                  name: valor
                  type: NUMERIC(12,2)
                  constraints:
                    nullable: false
              - column:
                  name: data_lancamento
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: confirmado
                  constraints:
                    nullable: false
              - column:
                  name: criado_em
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: atualizado_em
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: lancamento
            baseColumnNames: usuario_id
            constraintName: fk_lancamento_usuario
            referencedTableName: usuario
            referencedColumnNames: id
            onDelete: CASCADE
            onUpdate: CASCADE

        - addForeignKeyConstraint:
            baseTableName: lancamento
            baseColumnNames: conta_id
            constraintName: fk_lancamento_conta
            referencedTableName: conta
            referencedColumnNames: id
            onDelete: RESTRICT
            onUpdate: CASCADE

        - addForeignKeyConstraint:
            baseTableName: lancamento
            baseColumnNames: categoria_id
            constraintName: fk_lancamento_categoria
            referencedTableName: categoria
            referencedColumnNames: id
            onDelete: RESTRICT
            onUpdate: CASCADE

        - createIndex:
            tableName: lancamento
            indexName: idx_lancamento_usuario_id
            columns:
              - column:
                  name: usuario_id

        - createIndex:
            tableName: lancamento
            indexName: idx_lancamento_conta_id
            columns:
              - column:
                  name: conta_id

        - createIndex:
            tableName: lancamento
            indexName: idx_lancamento_categoria_id
            columns:
              - column:
                  name: categoria_id

        - createIndex:
            tableName: lancamento
            indexName: idx_lancamento_data
            columns:
              - column:
                  name: data_lancamento

  - changeSet:
      id: 004-04-create-meta-financeira
      author: ramos
      changes:
        - createTable:
            tableName: meta_financeira
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_meta_financeira
                    nullable: false
              - column:
                  name: usuario_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: nome
                  type: VARCHAR(120)
                  constraints:
                    nullable: false
              - column:
                  name: valor_alvo
                  type: NUMERIC(12,2)
                  constraints:
                    nullable: false
              - column:
                  name: valor_atual
                  type: NUMERIC(12,2)
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: data_limite
                  type: DATE
              - column:
                  name: status
                  type: VARCHAR(20)
                  defaultValue: ativa
                  constraints:
                    nullable: false
              - column:
                  name: criado_em
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: atualizado_em
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: meta_financeira
            baseColumnNames: usuario_id
            constraintName: fk_meta_usuario
            referencedTableName: usuario
            referencedColumnNames: id
            onDelete: CASCADE
            onUpdate: CASCADE

        - createIndex:
            tableName: meta_financeira
            indexName: idx_meta_usuario_id
            columns:
              - column:
                  name: usuario_id

        - createIndex:
            tableName: meta_financeira
            indexName: idx_meta_status
            columns:
              - column:
                  name: status