databaseChangeLog:
  - changeSet:
      id: create-user-auth-tables
      author: rodrigo
      changes:
        # Tabela usuario
        - createTable:
            tableName: usuario
            columns:
              - column:
                  name: pk
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: nome
                  type: varchar(255)
              - column:
                  name: sobrenome
                  type: varchar(255)
              - column:
                  name: data_nascimento
                  type: date
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: telefone
                  type: varchar(20)
              - column:
                  name: ativo
                  type: boolean

        # Tabela grupos
        - createTable:
            tableName: grupos
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: nome
                  type: varchar(100)
                  constraints:
                    unique: true
                    nullable: false

        # Tabela permissoes
        - createTable:
            tableName: permissoes
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: nome
                  type: varchar(100)
                  constraints:
                    unique: true
                    nullable: false

        # Tabela grupo_usuario
        - createTable:
            tableName: grupo_usuario
            columns:
              - column:
                  name: id
                  type: serial
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: fk_usuario
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_usuario_ref
                    references: usuario(pk)
              - column:
                  name: fk_grupo
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_grupo_ref
                    references: grupos(id)
              - column:
                  name: admin
                  type: boolean
                  defaultValueBoolean: false

        # Tabela grupos_permissao
        - createTable:
            tableName: grupos_permissao
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: fk_grupo
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_grupo_perm_ref
                    references: grupos(id)
              - column:
                  name: fk_permissao
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_perm_ref
                    references: permissoes(id)

        # Tabela tokens_acesso
        - createTable:
            tableName: tokens_acesso
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: fk_usuario
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_usuario_token_ref
                    references: usuario(pk)
              - column:
                  name: token_hash
                  type: varchar(64)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: emitido_em
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: expira_em
                  type: timestamp
              - column:
                  name: valido
                  type: boolean
                  defaultValueBoolean: true

        # Tabela tokens_refresh
        - createTable:
            tableName: tokens_refresh
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: fk_usuario
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_usuario_refresh_ref
                    references: usuario(pk)
              - column:
                  name: token_hash
                  type: varchar(64)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: emitido_em
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: expira_em
                  type: timestamp
              - column:
                  name: valido
                  type: boolean
                  defaultValueBoolean: true

        # Tabela tokens_revogados
        - createTable:
            tableName: tokens_revogados
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: fk_usuario
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_usuario_rev_ref
                    references: usuario(pk)
              - column:
                  name: token_hash
                  type: varchar(64)
              - column:
                  name: revogado_em
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: motivo
                  type: varchar(255)

      rollback:
        - dropTable:
            tableName: tokens_revogados
        - dropTable:
            tableName: tokens_refresh
        - dropTable:
            tableName: tokens_acesso
        - dropTable:
            tableName: grupos_permissao
        - dropTable:
            tableName: grupo_usuario
        - dropTable:
            tableName: permissoes
        - dropTable:
            tableName: grupos
        - dropTable:
            tableName: usuario
