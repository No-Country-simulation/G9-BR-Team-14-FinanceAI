databaseChangeLog:
  - changeSet:
      id: simplificar-tokens-acesso
      author: rodrigo
      changes:
        - dropTable:
            tableName: tokens_revogados
        - dropTable:
            tableName: tokens_refresh
        - dropColumn:
            tableName: tokens_acesso
            columnName: token_hash

      rollback:
        - addColumn:
            tableName: tokens_acesso
            columns:
              - column:
                  name: token_hash
                  type: varchar(64)
                  constraints:
                    unique: true
                    nullable: false
        - createTable:
            tableName: tokens_refresh
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: fk_usuario
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_usuario_refresh_ref
                    references: usuario(pk)
              - column:
                  name: token_hash
                  type: varchar(64)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: emitido_em
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: expira_em
                  type: timestamp
              - column:
                  name: valido
                  type: boolean
                  defaultValueBoolean: true
        - createTable:
            tableName: tokens_revogados
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: fk_usuario
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_usuario_rev_ref
                    references: usuario(pk)
              - column:
                  name: token_hash
                  type: varchar(64)
              - column:
                  name: revogado_em
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: motivo
                  type: varchar(255)
